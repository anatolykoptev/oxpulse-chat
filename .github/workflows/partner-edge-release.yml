name: partner-edge-release

on:
  push:
    tags:
      - 'partner-edge-v*'

permissions:
  contents: write   # upload release assets
  packages: write   # push to GHCR

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  lint-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shopt -s nullglob
          for f in deploy/partner-edge/*.sh; do
            echo ">> $f"
            shellcheck -x -S warning "$f"
          done

  extract-version:
    needs: lint-scripts
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: ver
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          tag="$GITHUB_REF_NAME"
          version="${tag#partner-edge-v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag"         >> "$GITHUB_OUTPUT"
      - name: Verify VERSION file matches tag
        env:
          EXPECTED_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          file_version=$(cat deploy/partner-edge/VERSION)
          if [[ "$file_version" != "$EXPECTED_VERSION" ]]; then
            echo "::error::VERSION file ($file_version) != tag version ($EXPECTED_VERSION)"
            exit 1
          fi

  build-and-push:
    needs: extract-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        component: [caddy, xray, coturn]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push ${{ matrix.component }}
        uses: docker/build-push-action@v6
        with:
          context: deploy/partner-edge/images
          file: deploy/partner-edge/images/Dockerfile.${{ matrix.component }}
          push: true
          build-args: |
            VERSION=${{ needs.extract-version.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/oxpulse-partner-edge-${{ matrix.component }}:v${{ needs.extract-version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/oxpulse-partner-edge-${{ matrix.component }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/oxpulse-partner-edge-${{ matrix.component }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=partner-edge-${{ matrix.component }}
          cache-to:   type=gha,scope=partner-edge-${{ matrix.component }},mode=max

  attach-release-assets:
    needs: [extract-version, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage artifacts
        env:
          VERSION: ${{ needs.extract-version.outputs.version }}
        run: |
          tar -czf "partner-edge-${VERSION}.tar.gz" \
            --transform "s,^deploy/partner-edge,partner-edge-${VERSION}," \
            deploy/partner-edge
          cp deploy/partner-edge/install.sh     partner-edge-installer.sh
          cp deploy/partner-edge/upgrade.sh     partner-edge-upgrade.sh
          cp deploy/partner-edge/healthcheck.sh partner-edge-healthcheck.sh
          sha256sum \
            "partner-edge-${VERSION}.tar.gz" \
            partner-edge-installer.sh \
            partner-edge-upgrade.sh \
            partner-edge-healthcheck.sh \
            > SHA256SUMS

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.extract-version.outputs.version }}
          TAG: ${{ needs.extract-version.outputs.tag }}
        run: |
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "partner-edge v${VERSION}" \
              --notes "OxPulse partner-edge bundle v${VERSION}. See deploy/partner-edge/README.md."
          fi
          gh release upload "$TAG" \
            "partner-edge-${VERSION}.tar.gz" \
            partner-edge-installer.sh \
            partner-edge-upgrade.sh \
            partner-edge-healthcheck.sh \
            SHA256SUMS \
            --clobber
