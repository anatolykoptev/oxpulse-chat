{
	http_port 80
	https_port 8443
	default_bind 127.0.0.1
}

files.hully.one {
	reverse_proxy localhost:5244
}

vpn.hully.one {
	handle /0a77ac0ee78cf732/json/* {
		uri strip_prefix /0a77ac0ee78cf732/json
		root * /opt/3x-ui/subs
		header Content-Type "application/json; charset=utf-8"
		header Profile-Title "VPN Hully"
		header Profile-Update-Interval "24"
		header Content-Disposition "attachment"
		file_server
	}
	handle {
		reverse_proxy localhost:9847
	}
}

hully.one {
	reverse_proxy localhost:3001
}

krolik.run {
	root * /home/krolik/krolik-site
	file_server
}

search.krolik.run {
	reverse_proxy localhost:3002
}

social.krolik.run {
	reverse_proxy localhost:8905
}

nerv.krolik.run {
	reverse_proxy localhost:8895
}

deploy.krolik.run {
	handle /deploy/github {
		reverse_proxy localhost:8765
	}
	handle /webhook/go-code {
		rewrite * /webhook/github
		reverse_proxy localhost:8897
	}
	respond "not found" 404
}

chat.krolik.run {
	reverse_proxy localhost:8907 {
		header_up X-Real-IP {client_ip}
		header_up X-Forwarded-For {client_ip}
		trusted_proxies private_ranges 70.34.243.184/32 81.90.183.114/32
	}
}

wg.hully.one {
	@websocket {
		header Connection *upgrade*
		header Upgrade websocket
	}
	reverse_proxy @websocket 127.0.0.1:51821

	root * /var/www/wg-cover
	file_server
}

:80 {
	bind 0.0.0.0
	root * /usr/share/caddy
	file_server
}

oxpulse.chat {
	handle /admin/* {
		reverse_proxy localhost:8908
	}
	reverse_proxy localhost:8907 {
		header_up X-Real-IP {client_ip}
		header_up X-Forwarded-For {client_ip}
		trusted_proxies private_ranges 70.34.243.184/32 81.90.183.114/32
	}
	header {
		Strict-Transport-Security "max-age=31536000; includeSubDomains"
		X-Content-Type-Options "nosniff"
		X-Frame-Options "DENY"
		-Via
		-Alt-Svc
	}
}

memdb.ai {
	root * /home/krolik/sites/memdb-site/dist
	file_server
	try_files {path} {path}/index.html {path}.html
	header {
		Strict-Transport-Security "max-age=31536000; includeSubDomains"
		X-Content-Type-Options "nosniff"
		X-Frame-Options "DENY"
		Cache-Control "public, max-age=3600"
	}
	handle_errors {
		respond "{err.status_code} {err.status_text}" {err.status_code}
	}
}

api.memdb.ai {
	handle /docs* {
		reverse_proxy localhost:3002
	}
	handle /static/* {
		reverse_proxy localhost:3002
	}
	handle_path / {
		redir https://api.memdb.ai/docs/ permanent
	}
	handle {
		reverse_proxy localhost:8080 {
			header_up X-Real-IP {client_ip}
			header_up X-Forwarded-For {client_ip}
		}
	}
	header {
		Strict-Transport-Security "max-age=31536000; includeSubDomains"
		X-Content-Type-Options "nosniff"
		X-Frame-Options "DENY"
	}
	@options method OPTIONS
	respond @options 204
}

chrome.krolik.run {
	reverse_proxy localhost:6080
}

mcp.krolik.run {
	map {http.request.header.Authorization} {mcp_user} {mcp_valid} {
		"Bearer {$MCP_TOKEN_ANATOLY}" "anatoly" "yes"
		"Bearer {$MCP_TOKEN_GUEST1}" "guest1" "yes"
		"Bearer {$MCP_TOKEN_GUEST2}" "guest2" "yes"
		default "anonymous" "no"
	}
	rate_limit {
		zone mcp_per_user {
			key {mcp_user}
			events 120
			window 1m
		}
		zone mcp_per_ip {
			key {client_ip}
			events 300
			window 1m
		}
	}

	route {
		@noauth expression `{mcp_valid} != "yes"`
		respond @noauth "Unauthorized" 401

		request_header X-MCP-User {mcp_user}

		handle_path /dozor/* {
			reverse_proxy localhost:8765 {
				header_up Host localhost:8765
			}
		}

		handle_path /memdb/* {
			reverse_proxy localhost:8001 {
				header_up Host localhost:8001
			}
		}

		handle_path /search/* {
			reverse_proxy localhost:8890 {
				header_up Host localhost:8890
			}
		}

		handle_path /code/* {
			reverse_proxy localhost:8897 {
				header_up Host localhost:8897
			}
		}

		handle_path /wowa/* {
			reverse_proxy localhost:8906 {
				header_up Host localhost:8906
			}
		}

		handle_path /wp/* {
			reverse_proxy localhost:8894 {
				header_up Host localhost:8894
				header_up Authorization "Bearer {$MCP_WP_BEARER}"
			}
		}

		handle_path /nerv/* {
			reverse_proxy localhost:8895 {
				header_up Host localhost:8895
			}
		}

		handle_path /job/* {
			reverse_proxy localhost:8891 {
				header_up Host localhost:8891
			}
		}

		handle_path /vaelor/* {
			reverse_proxy localhost:18790 {
				header_up Host localhost:18790
			}
		}

		handle /health {
			reverse_proxy localhost:18798
		}

		handle /ping {
			respond "ok" 200
		}

		respond "MCP Gateway: /dozor /memdb /search /code /wowa /vaelor /wp /nerv /job /health /ping" 200
	}

	header {
		Strict-Transport-Security "max-age=31536000; includeSubDomains"
		X-Content-Type-Options "nosniff"
		X-Frame-Options "DENY"
		-Server
	}

	log {
		output file /var/log/caddy/mcp-access.log {
			roll_size 10mb
			roll_keep 30
		}
	}
}
