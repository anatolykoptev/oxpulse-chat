<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OxPulse — Offline</title>
  <meta name="theme-color" content="#08080C" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #08080C;
      color: rgba(255,255,255,0.88);
      font-family: 'Urbanist', system-ui, sans-serif;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 360px; }
    .icon {
      width: 64px; height: 64px; margin: 0 auto 24px;
      border-radius: 50%;
      border: 1.5px solid rgba(201,169,110,0.2);
      background: rgba(201,169,110,0.06);
      display: flex; align-items: center; justify-content: center;
      color: #C9A96E;
    }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 15px; color: rgba(255,255,255,0.45); line-height: 1.5; margin-bottom: 28px; }
    button {
      padding: 14px 32px; border-radius: 12px;
      border: 1px solid rgba(201,169,110,0.3);
      background: rgba(201,169,110,0.1);
      color: #C9A96E; font-family: inherit;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: all 0.25s ease;
    }
    button:hover {
      background: rgba(201,169,110,0.18);
      border-color: rgba(201,169,110,0.5);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon" aria-hidden="true">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0119 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 015.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0122.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 014.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 016.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>
    <h1>Нет подключения</h1>
    <p>Для видеозвонков необходимо интернет-соединение. Проверьте подключение и попробуйте снова.</p>
    <button onclick="location.reload()">Попробовать снова</button>
  </div>
</body>
</html>
